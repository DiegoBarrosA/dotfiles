dpi-aware=no
width=50

font=FantasqueSansMono:weight=regular:size=36
line-height=60
fields=name,generic,comment,categories,filename,keywords
terminal=ghostty
prompt="> "
show-actions=yes
exit-on-keyboard-focus-loss=no
icons-enabled=no
inner-pad=100
horizontal-pad=1000
vertical-pad=1500
lines=10
layer=overlay
[colors]
background=212121ff
text=eeffffff
match=89ddffff
selection=212121ff
selection-text=82aaffff
selection-match=ffcb6bff
border=212121ff

[border]
radius=0

[dmenu]
exit-immediately-if-empty=yes
